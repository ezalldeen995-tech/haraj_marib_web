<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات - حراج مأرب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css?v=102">
</head>
<body>
    <div class="d-flex w-100">
        <aside class="sidebar d-flex flex-column">
            <a href="dashboard.html" class="sidebar-brand text-decoration-none">
                <i class="bi bi-shop me-2"></i> حراج مأرب
            </a>
            <ul class="nav flex-column mb-auto w-100">
                <li class="nav-item w-100"><a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i>الرئيسية</a></li>
                <li class="nav-item w-100" id="nav-users">
                    <a href="users.html" class="nav-link"><i class="bi bi-people"></i>المستخدمين</a></li>
                <li class="nav-item w-100"><a href="ads.html" class="nav-link"><i class="bi bi-megaphone"></i>الإعلانات</a></li>
                <li class="nav-item w-100"><a href="payments.html" class="nav-link"><i class="bi bi-cash-stack"></i>المدفوعات</a></li>
                <li class="nav-item w-100"><a href="categories.html" class="nav-link"><i class="bi bi-grid"></i>الأقسام</a></li>
                <li class="nav-item w-100"><a href="contact.html" class="nav-link"><i class="bi bi-envelope"></i>الرسائل</a></li>
                <li class="nav-item w-100"><a href="reports.html" class="nav-link"><i class="bi bi-flag"></i>البلاغات</a></li>
                <li class="nav-item w-100"><a href="logs.html" class="nav-link"><i class="bi bi-journal-text"></i>سجل النشاطات</a></li>
                <li class="nav-item w-100"><a href="notifications.html" class="nav-link active"><i class="bi bi-bell"></i>الإشعارات</a></li>
                <li class="nav-item w-100 mt-3 pt-3 border-top border-secondary"><a href="settings.html" class="nav-link">
                        <i class="bi bi-gear"></i>الإعدادات
                    </a>
                </li>
                <li class="nav-item w-100" id="nav-admins" style="display: none;"><a href="admin_users.html" class="nav-link"><i class="bi bi-shield-lock"></i>إدارة المدراء</a></li>
            
            </ul>
        </aside>

        <main class="main-content w-100">
            <header class="topbar">
                <div class="topbar-left"><h5 class="mb-0 fw-bold">إرسال الإشعارات</h5></div>
                <div class="topbar-right">
                    <div class="dropdown">
                        <button class="btn btn-light dropdown-toggle fw-bold d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-circle fs-5 text-primary"></i> <span id="admin-name-display">المشرف</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                            <li><a class="dropdown-item py-2" href="settings.html"><i class="bi bi-gear me-2 text-secondary"></i> الإعدادات</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button class="dropdown-item py-2 text-danger" id="logout-btn"><i class="bi bi-box-arrow-right me-2"></i> تسجيل الخروج</button></li>
                        </ul>
                    </div>
                </div>
            </header>

            <div class="container-fluid p-4">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card shadow-sm border-0 mb-4">
                            <div class="card-header bg-white border-bottom py-3">
                                <h5 class="mb-0 fw-bold"><i class="bi bi-bell text-warning me-2"></i> إرسال إشعار عام للجميع</h5>
                            </div>
                            <div class="card-body p-4">
                                <form id="notification-form">
                                    <div class="mb-4">
                                        <label for="notif-title" class="form-label fw-bold">عنوان الإشعار</label>
                                        <input type="text" id="notif-title" class="form-control form-control-lg" placeholder="مثال: تحديثات جديدة في التطبيق" required>
                                    </div>
                                    <div class="mb-4">
                                        <label for="notif-body" class="form-label fw-bold">نص الإشعار</label>
                                        <textarea id="notif-body" class="form-control form-control-lg" rows="5" placeholder="اكتب محتوى الإشعار هنا..." required></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-primary btn-lg fw-bold px-5 shadow-sm">
                                        <i class="bi bi-send-fill me-2"></i> إرسال الإشعار
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Confirm Modal -->
    <div class="modal fade" id="bsConfirmModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header bg-light border-bottom-0 pb-0"><h5 class="modal-title fw-bold" id="bsConfirmTitle">تأكيد</h5><button type="button" class="btn-close ms-0 me-auto" data-bs-dismiss="modal"></button></div>
          <div class="modal-body text-center py-4"><i class="bi bi-question-circle text-primary mb-3" style="font-size: 3rem;"></i><p class="fs-5 mb-0" id="bsConfirmMessage">هل أنت متأكد؟</p></div>
          <div class="modal-footer border-top-0 d-flex justify-content-center pt-0 pb-4"><button type="button" class="btn btn-secondary px-4 ms-2" data-bs-dismiss="modal">إلغاء</button><button type="button" class="btn btn-primary px-4" id="bsConfirmBtn">تأكيد</button></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js?v=102"></script>
    <script src="js/pages.js?v=101"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المشرف - حراج مأرب</title>
    
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=102">
</head>

<body class="login-page">

    <div class="card login-card shadow-lg">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px; font-size: 2rem;">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h3 class="fw-bold">تسجيل الدخول</h3>
                <p class="text-muted">لوحة تحكم المشرفين - حراج مأرب</p>
            </div>

            <form id="login-form">
                <div class="mb-3">
                    <label for="phone" class="form-label fw-semibold">رقم الجوال</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted"><i class="bi bi-phone"></i></span>
                        <input type="text" id="phone" name="phone" class="form-control" required placeholder="777XXXXXX" dir="ltr" text-align="right">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">كلمة المرور</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted"><i class="bi bi-key"></i></span>
                        <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••" dir="ltr">
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">دخول <i class="bi bi-box-arrow-in-left ms-2"></i></button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js?v=102"></script>
    <script>
        if (localStorage.getItem('admin_token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>

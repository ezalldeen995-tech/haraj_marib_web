<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تصفح جميع الإعلانات في حراج مأرب - بيع وشراء بسهولة في اليمن.">
    <title>الإعلانات - حراج مأرب</title>

    <!-- Bootstrap 5 RTL CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css?v=7">
</head>
<body>

    <!-- ============================================ -->
    <!-- NAVBAR -->
    <!-- ============================================ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/web/index.html">
                <i class="bi bi-shop"></i> حراج مأرب
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/web/index.html">
                            <i class="bi bi-house-door me-1"></i> الرئيسية
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/web/ads.html">
                            <i class="bi bi-megaphone me-1"></i> الإعلانات
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/web/contact.html">
                            <i class="bi bi-telephone me-1"></i> تواصل معنا
                        </a>
                    </li>
                </ul>
                <div id="navAuthArea"></div>
            </div>
        </div>
    </nav>

    <!-- ============================================ -->
    <!-- PAGE HEADER -->
    <!-- ============================================ -->
    <section class="ads-page-header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1 class="h3 fw-bold mb-1"><i class="bi bi-megaphone me-2" style="color: var(--primary);"></i>الإعلانات</h1>
                    <p class="text-muted mb-0">تصفح أحدث الإعلانات في جميع الأقسام</p>
                </div>
                <a href="post-ad.html" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i> أضف إعلان جديد
                </a>
            </div>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- MAIN CONTENT -->
    <!-- ============================================ -->
    <section class="py-4">
        <div class="container">
            <div class="row g-4">

                <!-- SIDEBAR FILTERS -->
                <div class="col-lg-3">
                    <div class="filter-sidebar">
                        <h5 class="filter-title">
                            <i class="bi bi-funnel me-1"></i> فلترة النتائج
                        </h5>

                        <!-- Search -->
                        <div class="filter-group">
                            <label class="filter-label">البحث</label>
                            <div class="input-group">
                                <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="ابحث عن إعلان...">
                                <button class="btn btn-outline-primary btn-sm" id="btnSearch">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Category -->
                        <div class="filter-group">
                            <label class="filter-label">القسم</label>
                            <select class="form-select form-select-sm" id="categoryFilter">
                                <option value="">جميع الأقسام</option>
                                <!-- Populated dynamically by ads.js -->
                            </select>
                        </div>

                        <!-- Price Range -->
                        <div class="filter-group">
                            <label class="filter-label">السعر</label>
                            <div class="row g-2">
                                <div class="col-6">
                                    <input type="number" class="form-control form-control-sm" id="minPrice" placeholder="من">
                                </div>
                                <div class="col-6">
                                    <input type="number" class="form-control form-control-sm" id="maxPrice" placeholder="إلى">
                                </div>
                            </div>
                        </div>

                        <button class="btn btn-primary btn-sm w-100 mt-2" id="btnApplyPrice">
                            <i class="bi bi-check2-circle me-1"></i> تطبيق الفلتر
                        </button>
                    </div>
                </div>

                <!-- ADS GRID -->
                <div class="col-lg-9">
                    <!-- Top Bar -->
                    <div class="ads-topbar">
                        <div class="d-flex align-items-center gap-3 flex-wrap">
                            <span id="resultCount" class="text-muted" style="font-size:0.9rem;">0 إعلان</span>
                            <div class="d-flex align-items-center gap-2 me-auto">
                                <label class="text-muted" style="font-size:0.85rem; white-space: nowrap;">ترتيب:</label>
                                <select class="form-select form-select-sm" id="sortSelect" style="width: auto;">
                                    <option value="newest">الأحدث</option>
                                    <option value="oldest">الأقدم</option>
                                    <option value="price_asc">السعر: الأقل</option>
                                    <option value="price_desc">السعر: الأعلى</option>
                                </select>
                            </div>
                            <div class="btn-group" role="group">
                                <button class="btn btn-outline-secondary btn-sm view-toggle-btn active" data-view="grid" title="عرض شبكة">
                                    <i class="bi bi-grid-3x3-gap-fill"></i>
                                </button>
                                <button class="btn btn-outline-secondary btn-sm view-toggle-btn" data-view="list" title="عرض قائمة">
                                    <i class="bi bi-list-ul"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Grid -->
                    <div class="row" id="adsGrid">
                        <!-- Ads will be rendered here by ads.js -->
                    </div>

                    <!-- Pagination -->
                    <div id="paginationArea" class="mt-3"></div>
                </div>

            </div>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- FOOTER -->
    <!-- ============================================ -->
    <footer class="site-footer" style="margin-top: 20px;">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <div class="footer-brand"><i class="bi bi-shop me-1"></i> حراج مأرب</div>
                    <p>سوقك المفتوح في اليمن - للبيع والشراء بأمان وسهولة.</p>
                </div>
                <div class="col-md-6 text-md-start">
                    <div class="footer-links mt-3 mt-md-0">
                        <a href="/web/index.html">الرئيسية</a>
                        <a href="/web/ads.html">الإعلانات</a>
                        <a href="/web/contact.html">تواصل معنا</a>
                    </div>
                </div>
            </div>
            <hr>
            <p class="copyright text-center mb-0">© 2026 حراج مأرب. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js?v=7"></script>
    <script src="js/ads.js?v=7"></script>
</body>
</html>

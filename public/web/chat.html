<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="المحادثات في حراج مأرب - تواصل مع البائعين والمشترين بسهولة.">
    <title>المحادثات - حراج مأرب</title>

    <!-- Bootstrap 5 RTL CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ============================================ -->
    <!-- NAVBAR -->
    <!-- ============================================ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/web/index.html">
                <i class="bi bi-shop"></i> حراج مأرب
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/web/index.html"><i class="bi bi-house-door me-1"></i> الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/web/ads.html"><i class="bi bi-megaphone me-1"></i> الإعلانات</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/web/chat.html"><i class="bi bi-chat-dots me-1"></i>
                            المحادثات</a>
                    </li>
                </ul>
                <div id="navAuthArea"></div>
            </div>
        </div>
    </nav>

    <!-- ============================================ -->
    <!-- CHAT CONTAINER -->
    <!-- ============================================ -->
    <section class="chat-page">
        <div class="chat-container">

            <!-- ======= LEFT: CONVERSATIONS SIDEBAR ======= -->
            <div class="chat-sidebar" id="chatSidebar">
                <div class="chat-sidebar-header">
                    <h5 class="fw-bold mb-0">
                        <i class="bi bi-chat-dots me-1"></i> المحادثات
                    </h5>
                </div>

                <!-- Search -->
                <div class="chat-sidebar-search">
                    <div class="input-group">
                        <input type="text" class="form-control" id="searchConversations"
                            placeholder="ابحث في المحادثات..." autocomplete="off">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                    </div>
                </div>

                <!-- Conversations List -->
                <div class="chat-conversations-list" id="conversationsList">
                    <!-- Skeleton loaders -->
                    <div class="chat-conv-item-skeleton">
                        <div class="skeleton-avatar"></div>
                        <div class="skeleton-lines">
                            <div class="skeleton-line w-75"></div>
                            <div class="skeleton-line w-50"></div>
                        </div>
                    </div>
                    <div class="chat-conv-item-skeleton">
                        <div class="skeleton-avatar"></div>
                        <div class="skeleton-lines">
                            <div class="skeleton-line w-75"></div>
                            <div class="skeleton-line w-50"></div>
                        </div>
                    </div>
                    <div class="chat-conv-item-skeleton">
                        <div class="skeleton-avatar"></div>
                        <div class="skeleton-lines">
                            <div class="skeleton-line w-75"></div>
                            <div class="skeleton-line w-50"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ======= RIGHT: CHAT WINDOW ======= -->
            <div class="chat-window" id="chatWindow">

                <!-- Empty State (no conversation selected) -->
                <div class="chat-empty-state" id="chatEmptyState">
                    <div class="chat-empty-icon">
                        <i class="bi bi-chat-square-text"></i>
                    </div>
                    <h4>ابدأ محادثة</h4>
                    <p class="text-muted">اختر محادثة من القائمة أو تواصل مع بائع من صفحة الإعلان.</p>
                </div>

                <!-- Active Chat -->
                <div class="chat-active d-none" id="chatActive">
                    <!-- Chat Header -->
                    <div class="chat-window-header">
                        <button class="btn btn-sm btn-outline-secondary d-lg-none me-2" id="btnBackToList">
                            <i class="bi bi-arrow-right"></i>
                        </button>
                        <div class="chat-header-avatar">
                            <img src="https://placehold.co/40x40/FFEDD5/F97316?text=👤" alt="" id="chatHeaderAvatar">
                        </div>
                        <div class="chat-header-info">
                            <h6 class="mb-0 fw-bold" id="chatHeaderName">---</h6>
                            <small class="text-muted" id="chatHeaderAd">---</small>
                        </div>
                        <a href="#" class="btn btn-sm btn-outline-primary ms-auto" id="chatHeaderAdLink"
                            title="عرض الإعلان">
                            <i class="bi bi-box-arrow-up-left me-1"></i> الإعلان
                        </a>
                        <button class="btn btn-sm btn-warning ms-2 d-none" id="btnRateChatUser" title="تقييم المستخدم">
                            <i class="bi bi-star"></i>
                        </button>
                    </div>

                    <!-- Messages Container -->
                    <div class="chat-messages" id="chatMessages">
                        <div class="text-center py-3" id="loadMoreMessages" style="display:none;">
                            <button class="btn btn-sm btn-outline-secondary" id="btnLoadMore">
                                <i class="bi bi-arrow-up me-1"></i> تحميل رسائل أقدم
                            </button>
                        </div>
                        <!-- Messages will be appended here -->
                    </div>

                    <!-- Chat Footer (Input) -->
                    <div class="chat-input-area">
                        <form id="sendMessageForm" class="chat-input-form">
                            <input type="text" class="form-control" id="messageInput" placeholder="اكتب رسالتك..."
                                autocomplete="off" maxlength="1000">
                            <button type="submit" class="btn btn-primary chat-send-btn" id="btnSendMessage">
                                <i class="bi bi-send-fill"></i>
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Rating Modal -->
    <div class="modal fade" id="ratingModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius:16px; border:none;">
                <div class="modal-header" style="border-bottom:1px solid rgba(0,0,0,0.06);">
                    <h5 class="modal-title fw-bold"><i class="bi bi-star me-2" style="color:#FFC107;"></i>تقييم هذا
                        المستخدم</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <div id="ratingAlertContainer"></div>
                    <p class="text-muted mb-3">اختر عدد النجوم ثم اكتب تعليقك</p>
                    <div class="rating-stars-input" id="ratingStarsInput">
                        <i class="bi bi-star" data-value="1"></i>
                        <i class="bi bi-star" data-value="2"></i>
                        <i class="bi bi-star" data-value="3"></i>
                        <i class="bi bi-star" data-value="4"></i>
                        <i class="bi bi-star" data-value="5"></i>
                    </div>
                    <input type="hidden" id="ratingValue" value="0">
                    <p class="rating-label mt-2 mb-3" id="ratingLabel">لم يتم التقييم بعد</p>
                    <textarea class="form-control" id="ratingComment" rows="3" placeholder="اكتب تعليقك هنا (اختياري)"
                        maxlength="500"
                        style="font-family:'Cairo',sans-serif; border-radius:10px; resize:none;"></textarea>
                </div>
                <div class="modal-footer" style="border-top:1px solid rgba(0,0,0,0.06);">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" id="btnSubmitRating">
                        <i class="bi bi-send me-1"></i> إرسال التقييم
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3" style="z-index:1100;"
        id="toastContainer"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js?v=3"></script>
    <script src="js/chat.js?v=4"></script>
    <script src="js/ratings.js"></script>
</body>

</html>

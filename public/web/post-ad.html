<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="أضف إعلانك الآن في حراج مأرب - سوقك المفتوح للبيع والشراء في اليمن.">
    <title>نشر إعلان جديد - حراج مأرب</title>

    <!-- Bootstrap 5 RTL CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css?v=9">
</head>

<body>

    <!-- ============================================ -->
    <!-- NAVBAR -->
    <!-- ============================================ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/web/index.html">
                <i class="bi bi-shop"></i> حراج مأرب
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/web/index.html"><i class="bi bi-house-door me-1"></i> الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/web/ads.html"><i class="bi bi-megaphone me-1"></i> الإعلانات</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/web/contact.html"><i class="bi bi-telephone me-1"></i> تواصل معنا</a>
                    </li>
                </ul>
                <div id="navAuthArea"></div>
            </div>
        </div>
    </nav>

    <!-- ============================================ -->
    <!-- POST AD HERO -->
    <!-- ============================================ -->
    <section class="post-ad-hero">
        <div class="container text-center">
            <div class="post-ad-hero-icon">
                <i class="bi bi-plus-circle"></i>
            </div>
            <h1>نشر إعلان جديد</h1>
            <p>أضف بيانات إعلانك وسيتم نشره بعد المراجعة</p>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- POST AD FORM -->
    <!-- ============================================ -->
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="post-ad-card">

                        <!-- Alert Container -->
                        <div id="alertContainer"></div>

                        <!-- Form -->
                        <!-- POST /ads - See ad.md Section 3 -->
                        <form id="postAdForm" enctype="multipart/form-data" novalidate>

                            <!-- Title -->
                            <div class="mb-3">
                                <label for="adTitle" class="form-label fw-semibold">
                                    <i class="bi bi-card-heading me-1"></i> عنوان الإعلان <span
                                        class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="adTitle"
                                    placeholder="مثال: تويوتا كامري 2023 نظيفة" maxlength="255" required>
                            </div>

                            <!-- Description -->
                            <div class="mb-3">
                                <label for="adDescription" class="form-label fw-semibold">
                                    <i class="bi bi-text-paragraph me-1"></i> وصف الإعلان <span
                                        class="text-danger">*</span>
                                </label>
                                <textarea class="form-control" id="adDescription" rows="4"
                                    placeholder="اكتب تفاصيل الإعلان بشكل واضح... (10 أحرف على الأقل)" minlength="10"
                                    required></textarea>
                            </div>

                            <div class="row g-3">
                                <!-- Price -->
                                <div class="col-md-6">
                                    <label for="adPrice" class="form-label fw-semibold">
                                        <i class="bi bi-currency-exchange me-1"></i> السعر (ر.ي) <span
                                            class="text-danger">*</span>
                                    </label>
                                    <input type="number" class="form-control" id="adPrice" placeholder="مثال: 500000"
                                        min="100" required>
                                </div>

                                <!-- Category -->
                                <div class="col-md-6">
                                    <label for="adCategory" class="form-label fw-semibold">
                                        <i class="bi bi-tag me-1"></i> القسم <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" id="adCategory" required>
                                        <option value="">اختر القسم...</option>
                                        <!-- Populated dynamically by ads.js -->
                                    </select>
                                </div>
                            </div>

                            <!-- Address -->
                            <div class="mb-3 mt-3">
                                <label for="adAddress" class="form-label fw-semibold">
                                    <i class="bi bi-geo-alt me-1"></i> العنوان <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="adAddress"
                                    placeholder="مثال: مأرب - شارع الستين" required>
                            </div>

                            <div class="row g-3">
                                <!-- Lat -->
                                <div class="col-md-4">
                                    <label for="adLat" class="form-label fw-semibold">
                                        <i class="bi bi-pin-map me-1"></i> خط العرض
                                    </label>
                                    <input type="number" class="form-control" id="adLat" placeholder="15.47" step="any">
                                </div>
                                <!-- Lng -->
                                <div class="col-md-4">
                                    <label for="adLng" class="form-label fw-semibold">
                                        <i class="bi bi-pin-map-fill me-1"></i> خط الطول
                                    </label>
                                    <input type="number" class="form-control" id="adLng" placeholder="45.32" step="any">
                                </div>
                                <!-- Year -->
                                <div class="col-md-4">
                                    <label for="adYear" class="form-label fw-semibold">
                                        <i class="bi bi-calendar-event me-1"></i> سنة الصنع
                                    </label>
                                    <input type="number" class="form-control" id="adYear" placeholder="2023" min="1990"
                                        max="2030">
                                </div>
                            </div>

                            <!-- Images -->
                            <div class="mb-3 mt-3">
                                <label for="adImages" class="form-label fw-semibold">
                                    <i class="bi bi-images me-1"></i> صور الإعلان <span class="text-danger">*</span>
                                    <small class="text-muted">(5 صور كحد أقصى، كل صورة لا تتجاوز 2 ميجا)</small>
                                </label>
                                <div class="image-upload-area" onclick="document.getElementById('adImages').click()">
                                    <i class="bi bi-cloud-arrow-up"></i>
                                    <p>اضغط لاختيار الصور</p>
                                    <small class="text-muted">JPEG, PNG, JPG</small>
                                </div>
                                <input type="file" class="form-control d-none" id="adImages" multiple
                                    accept="image/jpeg,image/png,image/jpg" required>
                                <div class="image-preview-grid" id="imagePreview"></div>
                            </div>

                            <hr>

                            <!-- Submit -->
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="bi bi-send-fill me-1"></i> نشر الإعلان
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- FOOTER -->
    <!-- ============================================ -->
    <footer class="site-footer">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <div class="footer-brand"><i class="bi bi-shop me-1"></i> حراج مأرب</div>
                    <p>سوقك المفتوح في اليمن - للبيع والشراء بأمان وسهولة.</p>
                </div>
                <div class="col-md-6 text-md-start">
                    <div class="footer-links mt-3 mt-md-0">
                        <a href="/web/index.html">الرئيسية</a>
                        <a href="/web/ads.html">الإعلانات</a>
                        <a href="#">تواصل معنا</a>
                    </div>
                </div>
            </div>
            <hr>
            <p class="copyright text-center mb-0">© 2026 حراج مأرب. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js?v=9"></script>
    <script src="js/ads.js?v=9"></script>
</body>

</html>

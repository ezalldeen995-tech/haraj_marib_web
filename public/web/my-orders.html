<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي - حراج مأرب</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css?v=6">
</head>

<body>
    <!-- Simple Navbar -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/web/index.html">
                <i class="bi bi-shop text-primary"></i> حراج مأرب
            </a>
            <div id="navAuthArea" class="ms-auto"></div>
        </div>
    </nav>

    <div class="container py-4" style="min-height: 70vh;">
        <h3 class="fw-bold mb-4"><i class="bi bi-bag-check me-2 text-primary"></i>طلباتي (المشتريات والمبيعات)</h3>
        
        <ul class="nav nav-tabs mb-4" id="ordersTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold" id="purchases-tab" data-bs-toggle="tab" data-bs-target="#purchases" type="button" role="tab">
                    <i class="bi bi-cart me-1"></i> مشترياتي
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold" id="sales-tab" data-bs-toggle="tab" data-bs-target="#sales" type="button" role="tab">
                    <i class="bi bi-shop me-1"></i> مبيعاتي
                </button>
            </li>
        </ul>
        
        <div class="tab-content" id="ordersTabsContent">
            <!-- Purchases -->
            <div class="tab-pane fade show active" id="purchases" role="tabpanel">
                <div class="row" id="purchasesGrid">
                    <!-- Loaded dynamically -->
                </div>
            </div>
            
            <!-- Sales -->
            <div class="tab-pane fade" id="sales" role="tabpanel">
                <div class="row" id="salesGrid">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer mt-auto py-3 bg-light text-center border-top">
        <div class="container text-muted small">
            © 2026 حراج مأرب. جميع الحقوق محفوظة.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js?v=6"></script>
    <script src="js/order.js?v=6"></script>
</body>
</html>

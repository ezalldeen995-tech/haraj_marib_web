<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="إنشاء حساب جديد في حراج مأرب - سجّل الآن وابدأ بالبيع والشراء.">
    <title>إنشاء حساب - حراج مأرب</title>

    <!-- Bootstrap 5 RTL CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- REGISTER PAGE (Multi-Step) -->
    <!-- ============================================ -->
    <div class="auth-page">
        <div class="auth-card" style="max-width: 500px;">
            <!-- Logo -->
            <div class="text-center">
                <a href="/web/index.html" class="auth-logo d-inline-block mb-2" style="text-decoration: none;">
                    <i class="bi bi-shop me-1"></i> حراج مأرب
                </a>
                <p class="auth-subtitle">أنشئ حسابك وابدأ البيع والشراء</p>
            </div>

            <!-- Step Progress Indicator -->
            <div class="step-progress">
                <div class="step active">1</div>
                <div class="step-line"></div>
                <div class="step">2</div>
            </div>

            <!-- Alert Container -->
            <div id="alertContainer"></div>

            <!-- ================================ -->
            <!-- STEP 1: Registration Info -->
            <!-- POST /register - auth.md Section 1 -->
            <!-- ================================ -->
            <div class="reg-step" id="step1">
                <form id="registerForm" novalidate>
                    <div class="mb-3">
                        <label for="regName" class="form-label">
                            <i class="bi bi-person me-1"></i> الاسم الكامل
                        </label>
                        <input
                            type="text"
                            class="form-control"
                            id="regName"
                            placeholder="مثال: أحمد محمد"
                            required
                            autocomplete="name"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="regPhone" class="form-label">
                            <i class="bi bi-phone me-1"></i> رقم الجوال
                        </label>
                        <input
                            type="tel"
                            class="form-control"
                            id="regPhone"
                            placeholder="مثال: 771234567"
                            required
                            autocomplete="tel"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="regPassword" class="form-label">
                            <i class="bi bi-lock me-1"></i> كلمة المرور
                        </label>
                        <div class="position-relative">
                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                id="regPassword"
                                placeholder="6 أحرف على الأقل"
                                required
                                minlength="6"
                                autocomplete="new-password"
                            >
                            <button
                                type="button"
                                class="btn btn-link position-absolute top-50 start-0 translate-middle-y"
                                style="color: var(--text-secondary); text-decoration: none; z-index: 5;"
                                onclick="togglePassword('regPassword', this)"
                            >
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="regPasswordConfirm" class="form-label">
                            <i class="bi bi-lock-fill me-1"></i> تأكيد كلمة المرور
                        </label>
                        <div class="position-relative">
                            <input
                                type="password"
                                name="password_confirmation"
                                class="form-control"
                                id="regPasswordConfirm"
                                placeholder="أعد إدخال كلمة المرور"
                                required
                                minlength="6"
                                autocomplete="new-password"
                            >
                            <button
                                type="button"
                                class="btn btn-link position-absolute top-50 start-0 translate-middle-y"
                                style="color: var(--text-secondary); text-decoration: none; z-index: 5;"
                                onclick="togglePassword('regPasswordConfirm', this)"
                            >
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-arrow-left me-1"></i> التالي - إنشاء الحساب
                    </button>
                </form>

                <div class="auth-links">
                    <p class="mb-0">
                        لديك حساب بالفعل؟
                        <a href="/web/login.html">تسجيل الدخول</a>
                    </p>
                </div>
            </div>

            <!-- ================================ -->
            <!-- STEP 2: OTP Verification -->
            <!-- POST /otp/verify - auth.md Section 4 -->
            <!-- ================================ -->
            <div class="reg-step" id="step2" style="display: none;">
                <div class="text-center mb-4">
                    <div style="width: 70px; height: 70px; background: var(--light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                        <i class="bi bi-phone-vibrate" style="font-size: 2rem; color: var(--primary);"></i>
                    </div>
                    <h5 style="font-weight: 700;">تأكيد رقم الجوال</h5>
                    <p class="text-muted" style="font-size: 0.9rem;">
                        أدخل كود التفعيل المرسل إلى رقم جوالك
                    </p>
                </div>

                <form id="otpForm" novalidate>
                    <div class="mb-4">
                        <label for="otpCode" class="form-label">كود التفعيل</label>
                        <input
                            type="text"
                            class="form-control text-center"
                            id="otpCode"
                            placeholder="- - - -"
                            maxlength="6"
                            required
                            style="letter-spacing: 12px; font-size: 1.4rem; font-weight: 700; padding: 14px;"
                            autocomplete="one-time-code"
                        >
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-1"></i> تأكيد الكود
                    </button>
                </form>

                <div class="auth-links">
                    <p class="mb-2">
                        لم يصلك الكود؟
                        <a href="#" id="resendOtp">إعادة إرسال الكود</a>
                    </p>
                    <p class="mb-0">
                        <a href="#" onclick="goToStep(1); return false;">
                            <i class="bi bi-arrow-right me-1"></i> رجوع للخطوة السابقة
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="js/app.js?v=3"></script>
    <!-- Auth JS -->
    <script src="js/auth.js?v=3"></script>

    <script>
        // Toggle password visibility
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
</body>
</html>

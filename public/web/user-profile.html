<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="الملف الشخصي العام - حراج مأرب">
    <title>الملف الشخصي - حراج مأرب</title>

    <!-- Bootstrap 5 RTL CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ============================================ -->
    <!-- NAVBAR -->
    <!-- ============================================ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/web/index.html">
                <i class="bi bi-shop"></i> حراج مأرب
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/web/index.html"><i class="bi bi-house-door me-1"></i> الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/web/ads.html"><i class="bi bi-megaphone me-1"></i> الإعلانات</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/web/contact.html"><i class="bi bi-telephone me-1"></i> تواصل معنا</a>
                    </li>
                </ul>
                <div id="navAuthArea"></div>
            </div>
        </div>
    </nav>

    <!-- ============================================ -->
    <!-- USER PROFILE HEADER -->
    <!-- ============================================ -->
    <section class="user-profile-hero">
        <div class="container">
            <div class="user-profile-header-card" id="profileHeaderCard">
                <div class="d-flex align-items-center gap-4 flex-wrap">
                    <div class="user-profile-avatar" id="userAvatar">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <div class="flex-grow-1">
                        <h2 class="fw-bold mb-1" id="userName">جاري التحميل...</h2>
                        <p class="text-muted mb-2" id="userSince"></p>

                        <!-- Rating Summary -->
                        <div class="user-rating-summary" id="ratingSummary">
                            <div class="user-stars" id="userStars">
                                <i class="bi bi-star"></i>
                                <i class="bi bi-star"></i>
                                <i class="bi bi-star"></i>
                                <i class="bi bi-star"></i>
                                <i class="bi bi-star"></i>
                            </div>
                            <span class="user-rating-avg" id="ratingAvg">0.0</span>
                            <span class="user-rating-count text-muted" id="ratingCount">(0 تقييم)</span>
                        </div>
                    </div>
                    <div id="rateButtonArea">
                        <!-- Rate button injected by JS if not self -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- TABS: ADS & RATINGS -->
    <!-- ============================================ -->
    <section class="py-4">
        <div class="container">
            <!-- Tab Navigation -->
            <ul class="nav nav-tabs user-profile-tabs mb-4" id="profileTabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabAds">
                        <i class="bi bi-megaphone me-1"></i> الإعلانات
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabRatings">
                        <i class="bi bi-star me-1"></i> التقييمات
                    </button>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content" id="profileTabContent">
                <!-- ADS TAB -->
                <div class="tab-pane fade show active" id="tabAds">
                    <div class="row" id="userAdsGrid">
                        <!-- Skeleton loaders / ads -->
                    </div>
                    <div id="adsPaginationArea" class="mt-3"></div>
                </div>

                <!-- RATINGS TAB -->
                <div class="tab-pane fade" id="tabRatings">
                    <div id="ratingsListContainer">
                        <!-- Ratings list -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- RATING MODAL -->
    <!-- ============================================ -->
    <div class="modal fade" id="ratingModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius:16px; border:none;">
                <div class="modal-header" style="border-bottom:1px solid rgba(0,0,0,0.06);">
                    <h5 class="modal-title fw-bold"><i class="bi bi-star me-2" style="color:#FFC107;"></i>تقييم هذا
                        المستخدم</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <div id="ratingAlertContainer"></div>

                    <p class="text-muted mb-3">اختر عدد النجوم ثم اكتب تعليقك</p>

                    <!-- Star Rating Input -->
                    <div class="rating-stars-input" id="ratingStarsInput">
                        <i class="bi bi-star" data-value="1"></i>
                        <i class="bi bi-star" data-value="2"></i>
                        <i class="bi bi-star" data-value="3"></i>
                        <i class="bi bi-star" data-value="4"></i>
                        <i class="bi bi-star" data-value="5"></i>
                    </div>
                    <input type="hidden" id="ratingValue" value="0">
                    <p class="rating-label mt-2 mb-3" id="ratingLabel">لم يتم التقييم بعد</p>

                    <!-- Comment -->
                    <textarea class="form-control" id="ratingComment" rows="3" placeholder="اكتب تعليقك هنا (اختياري)"
                        maxlength="500"
                        style="font-family:'Cairo',sans-serif; border-radius:10px; resize:none;"></textarea>
                </div>
                <div class="modal-footer" style="border-top:1px solid rgba(0,0,0,0.06);">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" id="btnSubmitRating">
                        <i class="bi bi-send me-1"></i> إرسال التقييم
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- FOOTER -->
    <!-- ============================================ -->
    <footer class="site-footer">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <div class="footer-brand"><i class="bi bi-shop me-1"></i> حراج مأرب</div>
                    <p>سوقك المفتوح في اليمن - للبيع والشراء بأمان وسهولة.</p>
                </div>
                <div class="col-md-6 text-md-start">
                    <div class="footer-links mt-3 mt-md-0">
                        <a href="/web/index.html">الرئيسية</a>
                        <a href="/web/ads.html">الإعلانات</a>
                        <a href="/web/contact.html">تواصل معنا</a>
                    </div>
                </div>
            </div>
            <hr>
            <p class="copyright text-center mb-0">© 2026 حراج مأرب. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3" style="z-index:1100;"
        id="toastContainer"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/ratings.js"></script>
</body>

</html>
